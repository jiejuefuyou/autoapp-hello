name: AutoChoice
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  AutoChoice:
    type: application
    platform: iOS
    sources:
      - path: AutoChoice
        excludes:
          - "Resources/StoreKitConfiguration.storekit"
          - "Resources/en.lproj"
          - "Resources/ja.lproj"
          - "Resources/zh-Hans.lproj"
          - "Resources/zh-Hant.lproj"
          - "Resources/ko.lproj"
          - "Resources/es.lproj"
          - "Resources/fr.lproj"
          - "Resources/de.lproj"
    resources:
      - path: AutoChoice/Resources/Assets.xcassets
      - path: AutoChoice/Resources/PrivacyInfo.xcprivacy
      - path: AutoChoice/Resources/en.lproj
      - path: AutoChoice/Resources/ja.lproj
      - path: AutoChoice/Resources/zh-Hans.lproj
      - path: AutoChoice/Resources/zh-Hant.lproj
      - path: AutoChoice/Resources/ko.lproj
      - path: AutoChoice/Resources/es.lproj
      - path: AutoChoice/Resources/fr.lproj
      - path: AutoChoice/Resources/de.lproj
      - path: AutoChoice/Resources/StoreKitConfiguration.storekit
        buildPhase: none
    entitlements:
      path: AutoChoice/AutoChoice.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.autochoice
        PRODUCT_NAME: AutoChoice
        INFOPLIST_KEY_CFBundleDisplayName: AutoChoice
        INFOPLIST_KEY_CFBundleLocalizations: "en ja zh-Hans zh-Hant ko es fr de"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        # v1.1.0: Custom URL scheme for shared-wheel deep links.
        # Universal Links use jiejuefuyou.github.io/autochoice/wheel (no Info.plist entry needed).
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: com.jiejuefuyou.autochoice.share
            CFBundleURLSchemes:
              - autochoice

  AutoChoiceWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AutoChoiceWidget
    entitlements:
      path: AutoChoiceWidget/AutoChoiceWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.autochoice.widget
        PRODUCT_NAME: AutoChoiceWidget
        INFOPLIST_FILE: AutoChoiceWidget/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
    dependencies:
      - framework: WidgetKit.framework
        embed: false
      - framework: SwiftUI.framework
        embed: false

  AutoChoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AutoChoiceTests
    dependencies:
      - target: AutoChoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.autochoice.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AutoChoice.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AutoChoice"
  AutoChoiceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AutoChoiceUITests
    dependencies:
      - target: AutoChoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.autochoice.uitests
        TEST_TARGET_NAME: AutoChoice
schemes:
  AutoChoice:
    build:
      targets:
        AutoChoice: all
        AutoChoiceWidget: all
        AutoChoiceTests: [test]
        AutoChoiceUITests: [test]
    test:
      config: Debug
      targets:
        - AutoChoiceTests
        - AutoChoiceUITests
    run:
      config: Debug
    archive:
      config: Release
